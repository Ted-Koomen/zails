name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target: [x86_64-linux, aarch64-macos]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build CLI
        run: zig build cli -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Package
        run: tar -czf zails-${{ matrix.target }}.tar.gz -C zig-out/bin zails

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zails-${{ matrix.target }}
          path: zails-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zails-x86_64-linux.tar.gz
            zails-aarch64-macos.tar.gz
          generate_release_notes: true
